<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HOMYCOCO Amazon Ads OAuth Callback</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f7f8fa; color: #1f2933; }
    main { max-width: 820px; margin: 0 auto; padding: 48px 24px; background: #fff; min-height: 100vh; box-sizing: border-box; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { line-height: 1.6; }
    label { display: block; font-weight: 600; margin: 24px 0 8px; }
    textarea { width: 100%; min-height: 92px; padding: 12px; font: 14px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace; box-sizing: border-box; }
    button { margin-top: 12px; padding: 10px 14px; border: 0; border-radius: 6px; background: #0b5cad; color: #fff; cursor: pointer; }
    .muted { color: #667085; }
    .error { color: #b42318; font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <h1>Amazon Ads OAuth Callback</h1>
    <p class="muted">This page displays the one-time authorization code returned by Login with Amazon. It does not store or transmit the code.</p>
    <div id="status"></div>
    <label for="code">Authorization code</label>
    <textarea id="code" readonly></textarea>
    <button id="copy" type="button">Copy code</button>
    <p class="muted">The code is short-lived. Use it promptly to exchange for an access token and refresh token in your local environment.</p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search || window.location.hash.slice(1));
    const code = params.get('code') || '';
    const error = params.get('error') || '';
    const status = document.getElementById('status');
    const codeBox = document.getElementById('code');
    if (code) {
      codeBox.value = code;
      status.textContent = 'Authorization code found in URL.';
    } else if (error) {
      status.className = 'error';
      status.textContent = 'Authorization failed: ' + error;
    } else {
      status.className = 'error';
      status.textContent = 'No authorization code found in the URL.';
    }
    document.getElementById('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText(codeBox.value);
    });
  </script>
</body>
</html>
